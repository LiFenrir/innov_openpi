# LeRobot pi05 Supervised Fine-Tuning Configuration (bi_s1_sft)
# =================================================
# Usage:
#   # Single GPU:
#   python scripts/train_pytorch.py --config configs/bi_s1/pi05_finetune_sft.yaml
#   python scripts/train_pytorch.py --config configs/bi_s1/pi05_finetune_sft.yaml --exp_name my_run
#
#   # Multi-GPU DDP (single node):
#   torchrun --standalone --nnodes=1 --nproc_per_node=4 \
#       scripts/train_pytorch.py --config configs/bi_s1/pi05_finetune_sft.yaml
#
#   # Multi-Node DDP:
#   torchrun --nnodes=2 --nproc_per_node=8 --node_rank=0 \
#       --master_addr=<ip> --master_port=29500 \
#       scripts/train_pytorch.py --config configs/bi_s1/pi05_finetune_sft.yaml
#
# All hyperparameters are specified directly in this YAML file.
# CLI overrides are supported for any field:
#   python scripts/train_pytorch.py --config configs/bi_s1/pi05_finetune_sft.yaml --batch-size 64
#
# DDP notes:
#   - ``batch_size`` is the GLOBAL batch size; each GPU receives batch_size / world_size samples.
#   - DDP is enabled automatically when WORLD_SIZE > 1 (set by torchrun).
#   - Checkpoints, wandb logging, and progress bar are rank-0 only.

name: bi_s1_pi05_sft
exp_name: bi_s1_finetune_sft_001

# ── Model ───────────────────────────────────────────────
model:
  _target_: Pi0Config
  pi05: true
  action_dim: 32
  action_horizon: 16
  max_token_len: 250
  paligemma_variant: gemma_2b
  action_expert_variant: gemma_300m

# ── Data ────────────────────────────────────────────────
data:
  _target_: LeRobotDataConfig
  repo_id: /home/kemove/VLA/datasets/bi_s1/bi_s1_sft
  robot_type: bi_s1
  default_prompt: "Grasp a single layer of the cloth with the gripper, then place the cloth onto the board"
  assets:
    asset_id: bi_s1_sft
  camera_map:
    front: base_0_rgb
    left_wrist: left_wrist_0_rgb
    right_wrist: right_wrist_0_rgb

# ── Weight Loading ─────────────────────────────────────
weight_loader:
  _target_: CheckpointWeightLoader
  params_path: /home/kemove/.cache/modelscope/hub/models/hairuoliu/pi05_base_pytorch

# ── Learning Rate Schedule ─────────────────────────────
lr_schedule:
  _target_: CosineDecaySchedule
  warmup_steps: 1000
  peak_lr: 0.000025
  decay_steps: 20000
  decay_lr: 0.0000025

# ── Optimizer ───────────────────────────────────────────
optimizer:
  _target_: AdamW
  b1: 0.9
  b2: 0.95
  weight_decay: 0.01
  clip_gradient_norm: 1.0

# ── Training ────────────────────────────────────────────
batch_size: 32
num_train_steps: 30000
seed: 42
log_interval: 100
save_interval: 2000
keep_period: 1000
# If the value is greater than 1, FSDP will be enabled and shard across number of specified devices.
# DDP (via torchrun) is preferred for most multi-GPU setups; use FSDP only when model exceeds single-GPU VRAM.
fsdp_devices: 1

wandb_enabled: false
