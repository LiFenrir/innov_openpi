# Stage 2: Online RL Training (Algorithm 1)
# ==========================================
# Runs the online RL loop: VLA → RL Token → Actor → Environment
# using TD3 with twin Q-critics and BC regularization.
#
# Usage:
#   python scripts/train_online_rl.py --config configs/rlt/stage2_online_rl.yaml
#
#   # CLI overrides (nested fields use dot notation):
#   python scripts/train_online_rl.py --config configs/rlt/stage2_online_rl.yaml \
#       --td3.gamma 0.95 --env.task-prompt "pick up the block"

# ── Action Space ────────────────────────────────────────
action_dim: 8
chunk_length: 10
vla_action_horizon: 16
max_env_steps: 10000000000
critical_phase_only: false

# ── Actor-Critic Architecture ────────────────────────────
rl_arch:
  embedding_dim: 2048
  mlp_hidden_dim: 256
  mlp_num_hidden_layers: 2
  actor_noise_sigma: 0.1
  ref_action_dropout: 0.5

# ── TD3 Hyperparameters ──────────────────────────────────
td3:
  gamma: 0.99
  tau: 0.005
  utd_ratio: 5
  bc_regularizer_beta: 0.5
  critic_updates_per_actor: 2
  target_noise_sigma: 0.2
  target_noise_clip: 0.5

# ── Optimizer ────────────────────────────────────────────
optimizer:
  actor_lr: 3.0e-4
  critic_lr: 3.0e-4

# ── Replay Buffer ────────────────────────────────────────
buffer:
  capacity: 100000
  batch_size: 256
  warmup_steps: 1000

# ── Environment ──────────────────────────────────────────
env:
  env_factory: ""
  intervention_factory: ""
  task_prompt: ""
  max_episode_chunks: 150

# ── Checkpoints ──────────────────────────────────────────
checkpoint:
  rl_token_checkpoint: ""
  vla_checkpoint_dir: ""
  vla_config_name: configs/bi_s1/pi05_finetune.yaml
  resume_checkpoint: ""
  warmup_buffer: "checkpoints/online_rl/warmup_buffer.pt"
  save_dir: checkpoints/online_rl
  run_name: ""
  save_every: 50
  log_every: 1
  print_every: 100

# ── wandb ────────────────────────────────────────────────
wandb:
  project: rlt-openpi
  enabled: false
