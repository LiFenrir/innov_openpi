# Stage 1: 联合训练（VLA + RL Token 同步优化）
# =================================================
# 使用 alpha=0.5 联合微调 VLA，让 VLA 的 embedding 空间适应
# 信息瓶颈压缩，同时保持 flow-matching 任务性能。
#
# L = L_ro(φ) + 0.5 * L_vla(θ_vla)
#
# Usage:
#   python scripts/train_rl_token.py --config configs/rlt/stage1_joint.yaml

# ── RL Token Trainer ────────────────────────────────────
train:
  # Architecture
  embedding_dim: 2048
  encoder_layers: 2
  encoder_heads: 8
  decoder_layers: 2
  decoder_heads: 8

  # Training
  num_train_steps: 10000
  batch_size: 32
  peak_lr: 1.0e-4
  weight_decay: 1.0e-5
  warmup_steps: 500
  decay_steps: 10000
  decay_lr: 1.0e-5
  max_grad_norm: 1.0

  # Joint training: alpha=0.5
  vla_finetune_alpha: 0.5
  vla_learning_rate: 1.0e-5
  gradient_checkpointing: true

  # Checkpoints
  vla_checkpoint_dir: checkpoints/bi_s1_pi05_sft_shifted/bi_s1_sft_shifted_run/24000
  vla_config_name: configs/bi_s1/pi05_finetune_sft_shifted.yaml
  resume_checkpoint: ""
  save_dir: checkpoints/rl_token
  run_name: bi_s1_joint
  save_every: 1000
  log_every: 1
  print_every: 100

  # wandb
  wandb_project: rlt-openpi
  wandb_enabled: false

# ── Dataset ─────────────────────────────────────────────
repo_id: /home/kemove/VLA/datasets/bi_s1/bi_s1_sft_shifted

data_transforms_fn: null

num_workers: 4
