# LeRobot pi05 Supervised Fine-Tuning Configuration (innov_arm)
# =================================================
# Usage:
#   # Single GPU:
#   python scripts/train_pytorch.py --config configs/bi_s1/pi05_finetune_innov_arm.yaml
#   python scripts/train_pytorch.py --config configs/bi_s1/pi05_finetune_innov_arm.yaml --exp_name my_run
#
#   # Multi-GPU DDP (single node):
#   torchrun --standalone --nnodes=1 --nproc_per_node=4 \
#       scripts/train_pytorch.py --config configs/bi_s1/pi05_finetune_innov_arm.yaml
#
#   # Multi-Node DDP:
#   torchrun --nnodes=2 --nproc_per_node=8 --node_rank=0 \
#       --master_addr=<ip> --master_port=29500 \
#       scripts/train_pytorch.py --config configs/bi_s1/pi05_finetune_innov_arm.yaml
#
# All hyperparameters are specified directly in this YAML file.
# CLI overrides are supported for any field:
#   python scripts/train_pytorch.py --config configs/bi_s1/pi05_finetune_innov_arm.yaml --batch-size 64
#
# DDP notes:
#   - ``batch_size`` is the GLOBAL batch size; each GPU receives batch_size / world_size samples.
#   - DDP is enabled automatically when WORLD_SIZE > 1 (set by torchrun).
#   - Checkpoints, wandb logging, and progress bar are rank-0 only.

name: innov_arm_pi05_sft
exp_name: innov_arm_sft_001

# ── Model ───────────────────────────────────────────────
model:
  _target_: Pi0Config
  pi05: true
  action_dim: 32
  action_horizon: 50
  max_token_len: 250
  paligemma_variant: gemma_2b
  action_expert_variant: gemma_300m
  rtc_config:
    enabled: true
    prefix_attention_schedule: LINEAR
    max_guidance_weight: 2.0
    execution_horizon: 15

# ── Data ────────────────────────────────────────────────
data:
  _target_: LeRobotDataConfig
  repo_id: /home/kemove/INNOV/datasets/innov_arm/innov_arm_sft
  robot_type: bi_innov_arm_v1
  default_prompt: "pick cloth, load into fabric printer"
  assets:
    asset_id: innov_arm_sft
  camera_map:
    front: base_0_rgb
    left_wrist: left_wrist_0_rgb
    right_wrist: right_wrist_0_rgb

# ── Weight Loading ─────────────────────────────────────
weight_loader:
  _target_: CheckpointWeightLoader
  params_path: /home/kemove/.cache/modelscope/hub/models/hairuoliu/pi05_base_pytorch

# ── Learning Rate Schedule ─────────────────────────────
lr_schedule:
  _target_: CosineDecaySchedule
  warmup_steps: 1000
  peak_lr: 0.000025
  decay_steps: 20000
  decay_lr: 0.0000025

# ── Optimizer ───────────────────────────────────────────
optimizer:
  _target_: AdamW
  b1: 0.9
  b2: 0.95
  weight_decay: 0.01
  clip_gradient_norm: 1.0

# ── Training ────────────────────────────────────────────
batch_size: 64 
num_train_steps: 30000
seed: 42
log_interval: 100
save_interval: 2000
keep_period: 2000
fsdp_devices: 1

wandb_enabled: false
