# ReCap Compute Advantages Configuration
# Usage:
#   python scripts/recap/compute_advantages.py --config configs/recap/recap_compute_advantages.yaml \
#       --value_checkpoint /path/to/value_checkpoint
#
#   # Multi-GPU:
#   torchrun --nproc_per_node=4 scripts/recap/compute_advantages.py \
#       --config configs/recap/recap_compute_advantages.yaml \
#       --value_checkpoint /path/to/value_checkpoint

advantage:
  value_checkpoint: /path/to/value_checkpoint
  batch_size: 2048
  flush_interval: 128
  num_dataloader_workers_per_gpu: 8
  prefetch_factor: 2
  discount_next_value: true

  # Top X% of samples will have positive advantage
  positive_quantile: 0.3

  # Tag for saving/reading
  tag: null
  returns_tag: null

  model:
    critic_expert_variant: "gemma_1m"
    tokenizer_path: /path/to/gemma-3-270m
    siglip_path: /path/to/siglip2-so400m-patch14-224
    gemma3_path: /path/to/gemma-3-270m

data:
  model_type: "pi05"
  robot_type: "libero"
  asset_id: "libero"

  camera_map:
    base: base_0_rgb
    wrist: left_wrist_0_rgb

  train_data_paths:
    - dataset_path: "/path/to/sft_dataset"
      robot_type: "libero"
      type: "sft"
      weight: 1.0

  advantage_lookahead_step: 10
  gamma: 1.0

distributed:
  enabled: true
  backend: "nccl"
  timeout: 3600
