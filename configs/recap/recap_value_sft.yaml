# ReCap Value Model SFT Training Configuration
# Usage: torchrun --nproc_per_node=N scripts/recap/train_value_sft.py --config configs/recap/recap_value_sft.yaml

critic_expert_variant: "gemma_100m"
num_bins: 201
v_min: -1.0
v_max: 0.0
siglip_path: "/path/to/siglip2-so400m-patch14-224"
gemma3_path: "/path/to/gemma-3-270m"
tokenizer_path: "/path/to/gemma-3-270m"
precision: "bf16"
freeze_vlm: false
action_dim: 7
action_horizon: 10

train_data_paths:
  - dataset_path: "/path/to/sft_dataset_with_returns"
    robot_type: "libero"
    type: "sft"
    weight: 1.0

eval_data_paths:
  - dataset_path: "/path/to/eval_dataset"
    max_samples: 10000
    robot_type: "libero"
    type: "sft"

camera_map:
  base: base_0_rgb
  wrist: left_wrist_0_rgb

assets_dir: "./assets"
asset_id: "libero"

tag: null
include_state: true
gamma: 1.0
normalize_to_minus_one_zero: true
robot_type: "libero"
model_type: "pi05"
balance_weights: true
train_num_workers: 8
eval_num_workers: 4
seed: 42

micro_batch_size: 64
global_batch_size: 512
max_steps: 8000
save_interval: 3000
val_check_interval: 500

lr: 1.0e-4
value_lr: 2.0e-4
adam_beta1: 0.9
adam_beta2: 0.95
adam_eps: 1.0e-8
weight_decay: 1.0e-10
clip_grad: 1.0
lr_scheduler: "constant"
lr_warmup_steps: 1000

log_every: 10
save_dir: "./checkpoints/value_sft"
run_name: "value_sft"
